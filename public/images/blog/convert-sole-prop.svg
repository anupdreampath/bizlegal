<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <rect width="640" height="400" rx="16" fill="#f5f0e8"/>
  <!-- Arrow flow -->
  <rect x="80" y="140" width="180" height="120" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="170" y="190" font-family="Georgia, serif" font-size="18" fill="#1f2937" text-anchor="middle">Sole</text>
  <text x="170" y="215" font-family="Georgia, serif" font-size="18" fill="#1f2937" text-anchor="middle">Proprietorship</text>
  <!-- Arrow -->
  <path d="M280 200 L340 200" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
  <polygon points="340,192 358,200 340,208" fill="#166534"/>
  <rect x="380" y="140" width="180" height="120" rx="12" fill="#166534"/>
  <text x="470" y="190" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle">California</text>
  <text x="470" y="215" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle">LLC</text>
  <!-- Steps below -->
  <g transform="translate(120, 300)">
    <circle r="12" cx="12" cy="12" fill="#166534" opacity="0.15"/>
    <text x="12" y="16" font-family="Arial" font-size="11" fill="#166534" text-anchor="middle" font-weight="bold">1</text>
    <text x="35" y="16" font-family="Arial" font-size="12" fill="#6b7280">File Articles</text>
  </g>
  <g transform="translate(250, 300)">
    <circle r="12" cx="12" cy="12" fill="#166534" opacity="0.15"/>
    <text x="12" y="16" font-family="Arial" font-size="11" fill="#166534" text-anchor="middle" font-weight="bold">2</text>
    <text x="35" y="16" font-family="Arial" font-size="12" fill="#6b7280">Get EIN</text>
  </g>
  <g transform="translate(370, 300)">
    <circle r="12" cx="12" cy="12" fill="#166534" opacity="0.15"/>
    <text x="12" y="16" font-family="Arial" font-size="11" fill="#166534" text-anchor="middle" font-weight="bold">3</text>
    <text x="35" y="16" font-family="Arial" font-size="12" fill="#6b7280">Transfer Assets</text>
  </g>
  <text x="320" y="70" font-family="Georgia, serif" font-size="20" fill="#111827" text-anchor="middle">Step-by-Step Conversion</text>
</svg>
