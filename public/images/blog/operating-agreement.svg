  <text x="320" y="90" font-family="Georgia, serif" font-size="16" fill="#111827" text-anchor="middle" font-weight="bold">OPERATING AGREEMENT</text>
  <rect x="200" y="105" width="240" height="1" fill="#e5e7eb"/>
  <rect x="200" y="120" width="180" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="200" y="135" width="220" height="6" rx="3" fill="#e5e7eb"/>
