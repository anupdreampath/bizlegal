  <text x="460" y="235" font-family="Arial" font-size="12" fill="white" text-anchor="middle" opacity="0.5">Payroll Tax Savings</text>
  <text x="460" y="255" font-family="Arial" font-size="12" fill="white" text-anchor="middle" opacity="0.5">More Formalities</text>
  <text x="320" y="60" font-family="Georgia, serif" font-size="18" fill="white" text-anchor="middle" opacity="0.7">Which is right for you?</text>
