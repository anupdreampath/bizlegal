<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <rect width="640" height="400" rx="16" fill="#1f2937"/>
  <rect x="80" y="100" width="200" height="200" rx="16" fill="#166534" opacity="0.6"/>
  <text x="180" y="180" font-family="Georgia, serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">LLC</text>
  <text x="180" y="215" font-family="Arial" font-size="12" fill="white" text-anchor="middle" opacity="0.5">Pass-through Tax</text>
  <text x="180" y="235" font-family="Arial" font-size="12" fill="white" text-anchor="middle" opacity="0.5">Flexible Management</text>
  <text x="180" y="255" font-family="Arial" font-size="12" fill="white" text-anchor="middle" opacity="0.5">Less Paperwork</text>
  <text x="320" y="210" font-family="Georgia, serif" font-size="24" fill="white" text-anchor="middle" opacity="0.6">vs</text>
  <rect x="360" y="100" width="200" height="200" rx="16" fill="#7c3aed" opacity="0.4"/>
  <text x="460" y="180" font-family="Georgia, serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">S-Corp</text>
