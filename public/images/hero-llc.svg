<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" rx="24" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="800" y2="50" stroke="white" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="0" y1="500" x2="800" y2="500" stroke="white" stroke-width="1"/>
    <line x1="0" y1="550" x2="800" y2="550" stroke="white" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="600" stroke="white" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="600" stroke="white" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="600" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="600" stroke="white" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="white" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="600" stroke="white" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="white" stroke-width="1"/>
    <line x1="550" y1="0" x2="550" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
    <line x1="650" y1="0" x2="650" y2="600" stroke="white" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="600" stroke="white" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="600" stroke="white" stroke-width="1"/>
  </g>
  <!-- Main document card -->
  <rect x="180" y="80" width="320" height="420" rx="16" fill="white" opacity="0.95"/>
  <rect x="180" y="80" width="320" height="70" rx="16" fill="#166534"/>
  <rect x="180" y="134" width="320" height="16" fill="#166534"/>
  <!-- Document header -->
  <text x="210" y="123" font-family="Georgia, serif" font-size="18" fill="white" font-weight="bold">Articles of Organization</text>
  <!-- Document lines -->
  <rect x="210" y="175" width="260" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="210" y="195" width="200" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="210" y="225" width="120" height="6" rx="3" fill="#166534" opacity="0.3"/>
  <text x="210" y="258" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Business Name</text>
  <rect x="210" y="265" width="260" height="1" fill="#e5e7eb"/>
  <text x="210" y="255" font-family="Georgia, serif" font-size="14" fill="#111827" opacity="0">Pacific Coast Ventures LLC</text>
  <rect x="210" y="268" width="180" height="10" rx="4" fill="#f3f4f6"/>
  <text x="210" y="305" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">State of Formation</text>
  <rect x="210" y="312" width="260" height="1" fill="#e5e7eb"/>
  <rect x="210" y="315" width="100" height="10" rx="4" fill="#f3f4f6"/>
  <text x="210" y="352" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">Registered Agent</text>
  <rect x="210" y="359" width="260" height="1" fill="#e5e7eb"/>
  <rect x="210" y="362" width="140" height="10" rx="4" fill="#f3f4f6"/>
  <!-- Stamp -->
  <circle cx="420" cy="430" r="40" fill="none" stroke="#166534" stroke-width="3" opacity="0.6"/>
  <circle cx="420" cy="430" r="32" fill="none" stroke="#166534" stroke-width="1.5" opacity="0.4"/>
  <text x="420" y="425" font-family="Arial, sans-serif" font-size="8" fill="#166534" text-anchor="middle" font-weight="bold" opacity="0.6">CALIFORNIA</text>
  <text x="420" y="438" font-family="Arial, sans-serif" font-size="8" fill="#166534" text-anchor="middle" font-weight="bold" opacity="0.6">APPROVED</text>
  <!-- Floating card - EIN -->
  <rect x="460" y="140" width="260" height="140" rx="14" fill="url(#card)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="460" y="140" width="260" height="140" rx="14" fill="white" opacity="0.12"/>
  <text x="490" y="175" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.7" font-weight="bold">EIN CONFIRMATION</text>
  <rect x="490" y="190" width="180" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="490" y="205" width="140" height="6" rx="3" fill="white" opacity="0.15"/>
  <rect x="490" y="220" width="200" height="6" rx="3" fill="white" opacity="0.2"/>
  <rect x="490" y="240" width="80" height="24" rx="12" fill="white" opacity="0.15"/>
  <text x="530" y="256" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" opacity="0.6">Pending</text>
  <!-- Floating card - Compliance -->
  <rect x="500" y="320" width="240" height="180" rx="14" fill="url(#card)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="500" y="320" width="240" height="180" rx="14" fill="white" opacity="0.12"/>
  <text x="530" y="355" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.7" font-weight="bold">COMPLIANCE</text>
  <!-- Progress bar -->
  <rect x="530" y="375" width="180" height="8" rx="4" fill="white" opacity="0.1"/>
  <rect x="530" y="375" width="130" height="8" rx="4" fill="#4ade80" opacity="0.6"/>
  <text x="530" y="405" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.5">Franchise Tax</text>
  <text x="690" y="405" font-family="Arial, sans-serif" font-size="11" fill="#4ade80" text-anchor="end" opacity="0.7">Due Apr 15</text>
  <text x="530" y="430" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.5">Statement of Info</text>
  <text x="690" y="430" font-family="Arial, sans-serif" font-size="11" fill="#4ade80" text-anchor="end" opacity="0.7">Complete</text>
  <text x="530" y="455" font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.5">BOI Report</text>
  <text x="690" y="455" font-family="Arial, sans-serif" font-size="11" fill="#4ade80" text-anchor="end" opacity="0.7">On track</text>
  <!-- Checkmark -->
  <circle cx="140" cy="200" r="28" fill="#4ade80" opacity="0.2"/>
  <path d="M128 200 L137 209 L153 191" stroke="#4ade80" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Decorative dots -->
  <circle cx="100" cy="450" r="4" fill="white" opacity="0.1"/>
  <circle cx="120" cy="470" r="3" fill="white" opacity="0.08"/>
  <circle cx="85" cy="480" r="5" fill="white" opacity="0.06"/>
  <circle cx="700" cy="80" r="6" fill="white" opacity="0.08"/>
  <circle cx="730" cy="100" r="3" fill="white" opacity="0.06"/>
</svg>
