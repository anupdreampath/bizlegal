  <g transform="translate(60, 260)">
    <circle r="16" cx="16" cy="16" fill="white" opacity="0.15"/>
    <text x="16" y="21" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">2</text>
    <text x="45" y="21" font-family="Arial" font-size="13" fill="white" opacity="0.6">File Articles</text>
  </g>
  <line x1="76" y1="295" x2="76" y2="315" stroke="white" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="4"/>
  <g transform="translate(60, 320)">
