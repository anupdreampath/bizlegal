  <rect x="300" y="330" width="60" height="18" rx="9" fill="#4ade80" opacity="0.6"/>
  <!-- Laptop base -->
  <path d="M250 360 L280 360 L280 365 Q280 370 285 370 L515 370 Q520 370 520 365 L520 360 L550 360 L555 370 Q555 380 545 380 L255 380 Q245 380 245 370 Z" fill="#374151"/>
