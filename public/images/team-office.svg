<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ede8dc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" rx="24" fill="url(#bg2)"/>
