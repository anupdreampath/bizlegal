  <circle cx="580" cy="250" r="35" fill="#166534" opacity="0.15"/>
  <circle cx="580" cy="235" r="18" fill="#c4a882"/>
  <path d="M555 290 Q555 265 580 265 Q605 265 605 290 L605 350 L555 350 Z" fill="#1f2937" opacity="0.8"/>
  <rect x="560" y="270" width="40" height="5" rx="2.5" fill="white" opacity="0.3"/>
  <!-- Document stack -->
  <rect x="120" y="300" width="70" height="50" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="130" y="310" width="40" height="3" rx="1.5" fill="#e5e7eb"/>
  <rect x="130" y="318" width="30" height="3" rx="1.5" fill="#e5e7eb"/>
  <rect x="130" y="326" width="45" height="3" rx="1.5" fill="#e5e7eb"/>
  <rect x="125" y="305" width="70" height="50" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="135" y="315" width="40" height="3" rx="1.5" fill="#e5e7eb"/>
  <rect x="135" y="323" width="30" height="3" rx="1.5" fill="#e5e7eb"/>
  <rect x="135" y="331" width="45" height="3" rx="1.5" fill="#e5e7eb"/>
  <!-- Coffee cup -->
  <rect x="615" y="315" width="30" height="35" rx="4" fill="#8b5e34" opacity="0.3"/>
  <rect x="612" y="310" width="36" height="8" rx="4" fill="#8b5e34" opacity="0.4"/>
  <path d="M645 325 Q660 325 660 335 Q660 345 645 345" stroke="#8b5e34" stroke-width="2" fill="none" opacity="0.3"/>
