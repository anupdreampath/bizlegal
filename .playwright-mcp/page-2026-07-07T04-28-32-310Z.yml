        - paragraph [ref=e64]: Industry
        - heading "Why restaurants need an LLC" [level=2] [ref=e65]
        - generic [ref=e66]:
          - paragraph [ref=e67]: Restaurants operate in a high-liability environment — from food safety to slip-and-fall risks to vendor disputes. An LLC creates a legal barrier between your personal assets and the daily risks of running a food service business.
          - paragraph [ref=e68]: In addition to general liability, restaurants face alcohol liability (if serving), employee disputes, health code violations, and delivery-related incidents. An LLC limits your personal exposure to these risks and makes your business more attractive to investors and landlords.
          - heading "Key risks for restaurant owners" [level=3] [ref=e69]
          - list [ref=e70]:
            - listitem [ref=e71]: Foodborne illness claims and health code violations
            - listitem [ref=e72]: Customer injuries on the premises
            - listitem [ref=e73]: Employee disputes and wage claims
            - listitem [ref=e74]: Alcohol service liability and dram shop claims
            - listitem [ref=e75]: Vendor, supplier, and delivery disputes
          - heading "How an LLC protects your restaurant" [level=3] [ref=e76]
          - paragraph [ref=e77]: An LLC separates your personal assets — your home, savings, and vehicles — from business debts and lawsuits. If a customer is injured or a supplier dispute escalates, the LLC is typically the defendant, not you personally. This protection also makes it easier to bring on partners, investors, or franchise opportunities.
          - heading "What you get with biz.legal" [level=3] [ref=e78]
          - paragraph [ref=e79]: We form your California restaurant LLC with attorney-drafted operating documents, professional state filing, and practical guidance for the next steps. You get documents that match how your restaurant is actually owned and managed, not a generic template.
