        - paragraph [ref=f12e88]: What's Included
        - heading "Everything Included in your Formation Package" [level=2] [ref=f12e89]
        - generic [ref=f12e90]:
          - 'heading "1. Legal Advice from the Start: ($300 value)" [level=3] [ref=f12e91]'
          - list [ref=f12e92]:
            - listitem [ref=f12e93]: A phone or email consultation with a practicing California attorney will get your formation process launched.
            - listitem [ref=f12e94]: We'll review your decision to form an LLC, versus sole prop., GP, or incorporation.
            - listitem [ref=f12e95]: Discuss your options regarding member-managed versus manager-managed, review your desired name and check if (i) it is available; and (ii) if it is permissible.
            - listitem [ref=f12e96]: Begin the formation process.
          - heading "2. State Filings ($500 value)" [level=3] [ref=f12e97]
          - paragraph [ref=f12e98]: We prepare and file Form LLC-1 with the Secretary of State — the document that legally creates your LLC. We also file your Initial Statement of Information (Form LLC-12) within the required 90-day window.
          - heading "3. Customized Operating Agreement ($2000 value)" [level=3] [ref=f12e99]
          - paragraph [ref=f12e100]: A comprehensive Operating Agreement drafted for your specific business — not a template. Covers ownership, management, distributions, exits, and disputes.
          - heading "4. Federal Filings ($250 value)" [level=3] [ref=f12e101]
          - paragraph [ref=f12e102]: We apply to the IRS on your behalf for your EIN (Employer Identification Number). Your EIN is required for bank accounts, tax filing, hiring, and business credit.
          - heading "5. Organizational Package" [level=3] [ref=f12e103]
          - list [ref=f12e104]:
            - listitem [ref=f12e105]: Biz.Legal's LLC Handbook for Operations
            - listitem [ref=f12e106]: Compiled Legal Documents e-Binder
            - listitem [ref=f12e107]: Template resolutions and minutes
            - listitem [ref=f12e108]: Compliance Calendar
          - heading "6. 1 Year of Law Firm Support" [level=3] [ref=f12e109]
          - list [ref=f12e110]:
            - listitem [ref=f12e111]: Registered Agent for 1 Year ($100 value)
            - listitem [ref=f12e112]:
